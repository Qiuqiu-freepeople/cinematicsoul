<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你会走向哪一种“电影女主的人生”？</title>
    <style>
        /* 换用国内专属的加速节点，确保手机端100%能加载出这款手写字体 */
        @import url('https://fonts.font.im/css?family=Ma+Shan+Zheng&display=swap');

        :root {
            --bg-color: #f7f5f0;
            --text-color: #1a1a1a;
            --accent-purple: #5c3a93;
            --border-ink: 2.5px solid #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* 首选加载好的网络手写体，并搭配全平台最优的手写体备选库 */
            font-family: 'Ma Shan Zheng', 'HanziPen SC', 'Wawati SC', 'STXingkai', 'KaiTi', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app {
            width: 95%;
            max-width: 800px;
            min-height: 85vh;
            padding: 60px 20px;
            position: relative;
            box-sizing: border-box;
            z-index: 1; 
        }

        .deco-star {
            position: absolute;
            width: 45px;
            height: 45px;
            fill: none;
            stroke: var(--text-color);
            stroke-width: 2;
            z-index: -1;
            opacity: 0.6;
        }
        .star-1 { top: 20%; right: 5%; }
        .star-2 { bottom: 25%; left: 2%; transform: scale(0.8); }

        .deco-wave {
            position: absolute;
            bottom: 5%;
            right: -20px;
            width: 280px;
            z-index: -1;
            opacity: 0.35; 
        }

        .content-layer {
            position: relative;
            z-index: 10;
        }

        .page {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .page.active {
            display: block;
            opacity: 1;
        }

        .main-title {
            font-size: 2.7rem;
            line-height: 1.4;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 3px;
        }
        .sub-title {
            font-size: 1.05rem;
            color: #666;
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 50px;
            font-family: Arial, sans-serif;
        }
        .intro-text {
            text-align: center;
            color: #444;
            font-size: 1.35rem;
            line-height: 2.2;
        }
        
        .question-number {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        .question-divider {
            width: 140px;
            height: 2px;
            background-color: var(--text-color);
            margin: 0 auto 50px auto;
            position: relative;
        }
        .question-divider::after {
            content: "✦";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-color);
            padding: 0 15px;
            font-size: 18px;
        }
        .question-text {
            font-size: 1.65rem; 
            line-height: 1.7;
            margin-bottom: 60px;
            text-align: center;
        }

        .btn-line {
            display: block;
            width: 100%;
            padding: 25px 30px; 
            margin: 25px 0;
            background: transparent;
            color: var(--text-color);
            font-family: inherit;
            font-size: 1.35rem;
            line-height: 1.5;
            text-align: left;
            cursor: pointer;
            border: 2px solid rgba(26, 26, 26, 0.4);
            border-radius: 15px;
            transition: transform 0.2s ease, border-color 0.2s ease; /* 移除背景色过渡，彻底杜绝变黑 */
            position: relative;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        /* 纯电脑端的鼠标悬停效果：仅边框加深并右移，无背景色变化 */
        @media (hover: hover) and (pointer: fine) {
            .btn-line:hover {
                border-color: var(--text-color);
                transform: translateX(8px);
            }
        }

        /* 纯手机端的物理按压反馈：点击时微微缩回，松手恢复，杜绝黑色残留 */
        .btn-line:active {
            border-color: var(--text-color);
            transform: scale(0.96);
        }

        .option-letter {
            font-family: inherit;
            margin-right: 15px;
            color: var(--text-color);
            font-size: 1.65rem;
        }

        .btn-start {
            text-align: center;
            border: 3px solid #1a1a1a;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            background: transparent;
            color: var(--text-color);
            font-family: inherit;
            font-size: 1.5rem;
            padding: 22px 40px;
            margin: 60px auto 0 auto;
            display: block;
            width: 85%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease;
        }
        
        .btn-start:active {
            transform: scale(0.95);
        }

        /* 结果页 */
        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .heroine-label {
            font-size: 1.2rem;
            color: var(--accent-purple);
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }
        .heroine-name {
            font-size: 2.85rem;
            margin-bottom: 40px;
            line-height: 1.4;
        }
        
        .bio-box {
            background-color: rgba(0,0,0,0.03);
            border-left: 4px solid var(--accent-purple);
            padding: 20px 25px;
            font-size: 1.2rem;
            line-height: 1.8;
            color: #555;
            margin-bottom: 40px;
            border-radius: 0 10px 10px 0;
            text-align: justify;
        }
        .bio-title {
            font-size: 0.9rem;
            font-family: Arial, sans-serif;
            color: var(--accent-purple);
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .report-title {
            margin-top: 50px; 
            color: var(--text-color); 
            font-size: 1.65rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .report-content {
            font-size: 1.35rem;
            line-height: 2.2;
            text-align: justify;
            margin-bottom: 50px;
            color: #222;
        }

        .loading-text {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        @media (max-width: 600px) {
            #app { width: 95%; padding: 40px 15px; }
            .main-title { font-size: 2.1rem; }
            .sub-title { font-size: 0.825rem; }
            .intro-text { font-size: 1.125rem; }
            .question-number { font-size: 1.2rem; }
            .question-text { font-size: 1.425rem; }
            .btn-line { font-size: 1.125rem; padding: 20px 20px; border-width: 1.5px; }
            .option-letter { font-size: 1.35rem; }
            .heroine-name { font-size: 2.1rem; }
            .bio-box { font-size: 1.05rem; padding: 15px 20px; }
            .report-content { font-size: 1.2rem; line-height: 2.1; }
            .report-title { font-size: 1.35rem; }
            .btn-start { font-size: 1.2rem; width: 100%; border-width: 2px; }
            .star-1 { top: 15%; right: 2%; }
            .deco-wave { width: 180px; bottom: 2%; right: -10px; }
        }
    </style>
</head>
<body>

<div id="app">
    <svg class="deco-star star-1" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,0 Q50,50 100,50 Q50,50 50,100 Q50,50 0,50 Q50,50 50,0Z" />
    </svg>
    <svg class="deco-star star-2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50,0 Q50,50 100,50 Q50,50 50,100 Q50,50 0,50 Q50,50 50,0Z" />
    </svg>
    <svg class="deco-wave" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
        <path d="M -10 70 Q 30 20 70 60 T 150 60 T 230 60 T 310 60" fill="none" stroke="var(--text-color)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M -30 100 Q 10 50 50 90 T 130 90 T 210 90 T 290 90" fill="none" stroke="var(--text-color)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </svg>

    <div class="content-layer">
        <div id="start-page" class="page active">
            <h1 class="main-title">你会走向哪一种<br>“电影女主的人生”？</h1>
            <div class="sub-title">FEMINIST DESTINY TEST</div>
            <div class="intro-text">
                这是一场关于潜意识的微型剧场。<br>
                不要思考，凭直觉翻开下一页，<br>
                看看命运为你写好了哪一种剧本。
            </div>
            <button class="btn-start" onclick="startTest()">翻开第一页</button>
        </div>

        <div id="quiz-page" class="page">
            <div class="question-number" id="q-num">01</div>
            <div class="question-divider"></div>
            <div class="question-text" id="q-text">问题加载中...</div>
            <div id="options-container"></div>
        </div>

        <div id="loading-page" class="page">
            <div class="loading-text">正在冲洗你的命运底片...</div>
        </div>

        <div id="result-page" class="page">
            <div class="result-header">
                <div class="heroine-label">YOUR CINEMATIC SOUL</div>
                <div class="heroine-name" id="r-name">加载中...</div>
                <div class="question-divider"></div>
            </div>
            
            <div class="bio-box">
                <div class="bio-title">HER STORY</div>
                <div id="r-bio">电影角色介绍加载中...</div>
            </div>

            <div class="report-title">✦ 你的独家人生剧本 ✦</div>
            <div class="report-content" id="r-desc">报告内容加载中...</div>
            <button class="btn-start" onclick="location.reload()" style="margin-top: 30px;">重新体验</button>
        </div>
    </div>
</div>

<script>
    const heroineBases = {
        A:[ 
            { 
                name: "《理智与情感》\n埃莉诺 (Elinor)", 
                bio: "在电影中，埃莉诺是那个永远把责任置于心碎之前的长女。即使面对爱人的错过与家族的衰落，她也能优雅地咽下眼泪，用极度的理智支撑起摇摇欲坠的生活。",
                script: "很多人以为你是一座休眠的冰山，但其实你只是把情绪藏得很深。在你的潜意识里，失控是一件极其危险的事。面对生活抛来的难题与人性的幽暗，你有着近乎残酷的清醒与极高的精神洁癖。你习惯于把波涛汹涌的情感压在心底，用无懈可击的体面去掩饰脆弱。<br><br>但这并不意味着你冷血，相反，你的感情往往因为过于克制而显得厚重。你的人生注定不是一场聒噪的闹剧，而是一部静水流深的史诗。当所有人都随波逐流时，你会独自守住那条名为“尊严”的底线，在漫长的岁月中，赢得属于你的、不容置喙的最终胜利。" 
            },
            { 
                name: "《简·爱》\n简·爱 (Jane Eyre)", 
                bio: "她没有优越的出身和夺目的容貌，却拥有一副绝不屈服的脊骨。面对居高临下的权贵与爱情，她留下了那句影史经典：“我们的精神是平等的。”",
                script: "你的骨血里刻着一种近乎本能的平等主义。你或许没有拿到世界上最好的一把牌，但你绝对拒绝任何人用居高临下的姿态向你施舍。在你的人生剧本里，所有的妥协与依附都是毒药。<br><br>你拥有一种“荒野求生”般的韧性，别人觉得那是倔强，只有你自己知道，那是为了保全灵魂的完整。如果在世俗的安稳和内心的自由之间只能选一个，你会毫不犹豫地选择后者。哪怕要在一片荒芜中独自跋涉，你也发誓要以绝对独立的姿态前行，去赢回那份属于你的、清白而坚定的爱与人生。" 
            },
            { 
                name: "《傲慢与偏见》\n伊丽莎白 (Elizabeth)", 
                bio: "她聪慧、机敏，拥有一双能看透虚伪的眼睛。在那个女人只能靠婚姻改变命运的时代，她果断拒绝了傲慢的富家子弟，只为追求绝对契合的灵魂。",
                script: "如果人生是一场大型的社交舞会，你绝对是那个站在角落里，冷眼看透所有人底牌的观察者。你极其聪明，精神阈值极高，绝不轻易向世俗的标准低头。对你而言，哪怕孤独终老，也绝不在一段充满算计或毫无共鸣的关系里将就。<br><br>你的言辞偶尔锋利，那是因为你无法忍受这个世界的愚蠢与虚伪。你在等待一场势均力敌的交锋，寻找那个能听懂你弦外之音的人。你的人生剧本是一场漂亮的偏见粉碎战，你终将用你的智慧，亲自挑选出那个配得上你灵魂的世界。" 
            },
            { 
                name: "《赎罪》\n布里奥妮 (Briony)", 
                bio: "她是一个极度敏感的创作者，年少时因一个自以为是的误会毁掉了姐姐的一生。此后的漫长岁月里，她用尽一生在文字中进行着痛苦而凄美的灵魂赎罪。",
                script: "你的灵魂带着一丝易碎的艺术感，你对周遭世界有着雷达般敏锐的感知力。那些常人忽略的微小情绪、一个眼神的闪烁，在你眼里都能掀起一场海啸。你经常游走在现实与潜意识的边界，有时甚至会被自己过于旺盛的共情力所伤。<br><br>你的底色是悲悯且深刻的。你总是习惯在内心进行严苛的自我审视，仿佛背负着某种无形的十字架。但正是这种对人性深渊的凝视，赋予了你极高的灵性。你的人生剧本注定不会轻浅，你将把经历过的所有痛苦与遗憾，酿成一首惊艳世人的长诗。" 
            },
            { 
                name: "《走出非洲》\n凯伦 (Karen)", 
                bio: "她远赴非洲，经历了婚姻的背叛、农场的破产和爱人的坠机。但当她失去一切时，她没有崩溃，而是带着非洲旷野赋予她的辽阔，优雅地转身。",
                script: "在你的人生剧本里，从来没有“永远困在原地”这个选项。你的生命带着一种难以言喻的辽阔感。面对失去、变故甚至背叛，你可能会短暂地感到痛楚，但你绝不会允许自己沦为一个祥林嫂式的怨妇。<br><br>你有一种近乎大地之母般的包容力与韧性。你深知所有的拥有都是暂时的，因此你更懂得品尝沿途那些真实的狂野与美丽。那些试图击垮你的苦难，最终都会变成你生命版图上的一座座山丘。你不需要别人为你遮风挡雨，因为你自己，终将长成一片包容万物的旷野。" 
            }
        ],
        B:[ 
            { 
                name: "《天使爱美丽》\n艾米丽 (Amélie)", 
                bio: "这个古灵精怪的巴黎女孩，总是带着一丝狡黠的微笑。她像个隐秘的魔法师，用各种奇思妙想的小手段，悄悄治愈着身边每一个孤独的灵魂。",
                script: "现实世界对你来说太枯燥了，所以你不得不在脑海里搭建一个充满奇幻色彩的游乐场。你是一个隐秘的生活观察家，总能在一地鸡毛的日常里，精准捕捉到那些闪闪发光的微小碎片。<br><br>你有一种不动声色的浪漫，哪怕自己偶尔也会陷入孤独，却依然忍不住想用一点点“魔法”去缝补这个世界的粗糙。你可能不擅长正面交锋，但你总能以最意想不到的方式，在别人干涸的生命里种下一朵玫瑰。你的人生剧本，就是一部带有复古滤镜的童话，你本身就是奇迹的代名词。" 
            },
            { 
                name: "《爱在黎明破晓前》\n塞琳 (Céline)", 
                bio: "在开往维也纳的火车上，她与一个陌生人攀谈，随后毫无保留地跳下火车，在异国的街头漫步、谈论哲学与爱情，直到黎明将他们分开。",
                script: "你的潜意识里，藏着对“绝对纯粹”的极致渴望。比起物质的堆砌，你更在乎灵魂是否能产生共鸣。你对这个世界充满了好奇与哲思，无法忍受庸俗无聊的寒暄。<br><br>你是一个彻底的感受派，如果遇到那个能接住你所有奇思妙想的人，你甚至有勇气为了一个瞬间而抛弃所有既定轨道。你的人生不是由一个个目标组成的，而是由一段段深刻的对白、一次次心跳的漏拍拼凑而成。你的一生，注定要在寻找精神乌托邦的路上，留下一道极致浪漫的轨迹。" 
            },
            { 
                name: "《布达佩斯大饭店》\n阿加莎 (Agatha)", 
                bio: "她是个脸上带着胎记的面包房女孩。在那个被战争和阴谋笼罩、荒诞不经的世界里，她一边安静地做着精致的甜点，一边在枪林弹雨中展现出惊人的勇敢。",
                script: "无论外部世界变得多么混乱、荒诞甚至崩塌，你心里始终有一套坚不可摧的秩序与美感。别人都在随波逐流、陷入狂躁，你却能在自己的结界里，安静且专注地修剪一盆花。<br><br>你的勇敢是非常有欺骗性的。你看上去或许温和、无害，甚至带点天真，但当危机真正降临时，你骨子里的从容会爆发出让人战栗的力量。你从不靠嘶吼来证明自己，你的人生剧本，就是在充满废墟的现实里，徒手建立起一座精致且充满尊严的粉色城堡。" 
            },
            { 
                name: "《月升王国》\n苏西 (Suzy)", 
                bio: "她带着浓重的眼影，提着装满童话书的手提箱和一个望远镜，为了逃离枯燥的家庭，和一个同样古怪的男孩策划了一场在小岛上的私奔。",
                script: "你这具躯壳里，永远住着一个随时准备“私奔”的叛逆者。你对大人们制定的无聊规则嗤之以鼻，你用望远镜眺望的，永远是那个只有你才能看见的理想国。<br><br>你身上带着一种非常迷人的、带着忧郁滤镜的童真。哪怕到了八十岁，你依然会为了某个不切实际的念头而心跳加速。你拒绝被这个平庸的世界同化，宁愿在自己的小宇宙里做一个古怪的“异类”。你的人生剧本没有按部就班的轨道，只有一次次向着月光与旷野的、奋不顾身的逃亡。" 
            },
            {

    let currentQuestionIndex = 0;

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(page => {
            page.classList.remove('active');
            setTimeout(() => {
                if(!page.classList.contains('active')) {
                    page.style.display = 'none';
                }
            }, 500);
        });
        
        const nextPage = document.getElementById(pageId);
        nextPage.style.display = 'block';
        setTimeout(() => {
            nextPage.classList.add('active');
        }, 50);
    }

    function startTest() {
        currentQuestionIndex = 0;
        userChoices =[];
        scores = { A: 0, B: 0, C: 0, D: 0 };
        renderQuestion();
        showPage('quiz-page');
    }

    function renderQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById('q-num').innerText = String(currentQuestionIndex + 1).padStart(2, '0');
        document.getElementById('q-text').innerText = q.text;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        const displayLetters = ['A', 'B', 'C', 'D'];
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-line';
            btn.innerHTML = `<span class="option-letter">${displayLetters[index]}.</span> ${opt.text}`;
            btn.onclick = () => handleAnswer(opt);
            optionsContainer.appendChild(btn);
        });
    }

    function handleAnswer(selectedOption) {
        scores[selectedOption.type]++;
        userChoices.push(selectedOption.type);
        
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            const quizPage = document.getElementById('quiz-page');
            quizPage.style.opacity = 0;
            setTimeout(() => {
                renderQuestion();
                quizPage.style.opacity = 1;
            }, 400);
        } else {
            calculateDynamicResult();
        }
    }

                }
            }

            let answerString = userChoices.join('');
            let hashVal = 0;
            for(let i=0; i<answerString.length; i++) {
                hashVal += answerString.charCodeAt(i) * (i+1);
            }
            const archetypeIndex = hashVal % 5;
            const baseArchetype = heroineBases[dominantType][archetypeIndex];

            document.getElementById('r-name').innerText = baseArchetype.name;
            document.getElementById('r-bio').innerText = baseArchetype.bio;
            document.getElementById('r-desc').innerHTML = baseArchetype.script;

            showPage('result-page');
        }, 1800);
    }
</script>

</html>
